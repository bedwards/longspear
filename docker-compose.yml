services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: longspear-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-longspear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-longspear_dev}
      POSTGRES_DB: ${POSTGRES_DB:-longspear}
    ports:
      - "25432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-longspear} -d ${POSTGRES_DB:-longspear}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: longspear-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-28000}:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./src:/app/src
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-longspear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-longspear_dev}
      POSTGRES_DB: ${POSTGRES_DB:-longspear}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # Use native Ollama on the host (Metal GPU)
      OLLAMA_HOST: http://host.docker.internal:11434
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  pgdata:
